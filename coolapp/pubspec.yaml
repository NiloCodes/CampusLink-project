name: campuslink
description: CampusLink — The exclusive peer-to-peer marketplace for UCC student services.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  firebase_storage: ^13.4.0

  # State management
  provider: ^6.1.1

  # Image picking (KYC screen)
  image_picker: ^1.0.7

  # Networking & caching
  cached_network_image: ^3.3.1
  connectivity_plus: ^7.1.1

  # Formatting
  intl: ^0.20.2

  # Security
  flutter_secure_storage: ^10.2.0

  # Utilities
  url_launcher: ^6.2.4
  permission_handler: ^12.0.1

  # UI extras
  shimmer: ^3.0.0
  pinput: ^6.0.2
  flutter_rating_bar: ^4.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_18pt-ExtraBold.ttf
          weight: 800