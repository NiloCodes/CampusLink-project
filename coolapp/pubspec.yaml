name: campuslink
description: CampusLink — The exclusive peer-to-peer marketplace for UCC student services.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # State management
  provider: ^6.1.1

  # Image picking (KYC screen)
  image_picker: ^1.0.7

  # Networking & caching
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2

  # Formatting
  intl: ^0.18.1

  # Security
  flutter_secure_storage: ^9.0.0

  # Utilities
  url_launcher: ^6.2.4
  permission_handler: ^11.3.0

  # UI extras
  shimmer: ^3.0.0
  pinput: ^4.0.0
  flutter_rating_bar: ^4.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/